<div class="login-wrapper">
  <!-- Elementos decorativos de fondo -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-card">
    <div class="brand-section">
      <img src="LogoAgora.png" alt="Logo Agora" class="logo">
      <h1 class="app-title">Bienvenido a <span>{{ themeService.getThemeConfig().appName }}</span></h1>
      <p class="subtitle">Ingrese sus credenciales para continuar</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group">
        <label for="InputEmailLogin">Nombre de Usuario</label>
        <div class="input-wrapper">
          <i class="pi pi-user input-icon"></i>
          <input id="InputEmailLogin" type="email" formControlName="usuarion" placeholder="Usuario">
        </div>
      </div>

      <div class="input-group">
        <label for="InputPasswordLogin">Contraseña</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input id="InputPasswordLogin" type="password" formControlName="contraseña" placeholder="••••••••">
        </div>
      </div>

      <div class="forgot-password">
        <a href="/olvidocontraseña">¿Olvidó su contraseña?</a>
      </div>

      <button type="submit" class="btn-primary" [disabled]="formulario.invalid">
        <span>Iniciar Sesión</span>
        <i class="pi pi-arrow-right"></i>
      </button>
    </form>

    <div class="divider">
      <span>O acceder de otra forma</span>
    </div>

    <div class="secondary-actions">
      <button type="button" class="btn-guest" (click)="loginInvitado()">
        <i class="pi pi-user-plus"></i> Acceder como Invitado
      </button>
      <button type="button" class="btn-home" routerLink="/interno">
        <i class="pi pi-home"></i> Página de Inicio
      </button>
    </div>
  </div>
</div>
