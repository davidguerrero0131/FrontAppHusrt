<div class="dashboard-container">

  <div class="hero-section">
    <div class="hero-content">
      <h1>Espacios de Reserva</h1>
      <p>Administración general y gestión de reservas.</p>
    </div>
  </div>

  <div class="cards-grid">

    <!-- Parametrización -->
    <a class="dashboard-card nav-link-container" [routerLink]="['/admin/espacios-reserva']">
      <div class="card-icon-container gradient-orange">
        <i class="pi pi-cog"></i>
      </div>
      <div class="card-content">
        <h3>Parametrizaci&oacute;n</h3>
        <p>Cree, edite o desactive espacios de reserva.</p>
        <span class="card-action">Administrar <i class="pi pi-arrow-right"></i></span>
      </div>
    </a>

    <!-- Gestión -->
    <a class="dashboard-card nav-link-container" [routerLink]="['/admin/gestion-reservas']">
      <div class="card-icon-container gradient-green">
        <i class="pi pi-calendar"></i>
      </div>
      <div class="card-content">
        <h3>Gesti&oacute;n de Reservas</h3>
        <p>Revise el calendario y administre las solicitudes de reserva.</p>
        <span class="card-action">Ingresar <i class="pi pi-arrow-right"></i></span>
      </div>
    </a>

  </div>
</div>
