<app-mantenimientoadminnavbar></app-mantenimientoadminnavbar>

<div class="dashboard-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <button class="btn btn-secondary me-2" (click)="volver()">
        <i class="bi bi-arrow-left me-2"></i>Volver
      </button>
    </div>
    <h3 class="mb-0">Catálogo de Elementos</h3>
    <div>
      <button class="btn btn-primary" (click)="crearElemento()" *ngIf="isAdmin">
        <i class="bi bi-plus-circle me-2"></i>Nuevo Elemento
      </button>
    </div>
  </div>

  <div class="card shadow-2 border-round-xl p-0 overflow-hidden bg-white">

        <p-table #dt1 [value]="elementos" dataKey="id" [rows]="10" [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} entradas"
            [globalFilterFields]="['nombre']" styleClass="p-datatable-striped" [rowHover]="true"
            responsiveLayout="scroll">

            <ng-template pTemplate="caption">
                <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center gap-3 p-2">
                    <h3 class="m-0 font-bold text-900">Listado de Activos</h3>

                    <!-- FILTRO DE NOMBRE PRINCIPAL -->
                    <span class="p-input-icon-left w-full md:w-25rem">
                        <i class="pi pi-search"></i>
                        <input pInputText type="text" (input)="onGlobalFilter($event)"
                            placeholder="Buscar por nombre de elemento..."
                            class="w-full p-3 shadow-1 border-round-lg" />
                    </span>
                </div>
            </ng-template>

            <ng-template pTemplate="header">
                <tr class="surface-ground">
                    <th pSortableColumn="nombre" style="min-width:15rem">
                        <div class="flex align-items-center">
                            Nombre <p-sortIcon field="nombre"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="tipo" style="min-width:10rem">
                        <div class="flex align-items-center">
                            Tipo <p-sortIcon field="tipo"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="estado" style="min-width:10rem">
                        <div class="flex align-items-center">
                            Estado <p-sortIcon field="estado"></p-sortIcon>
                        </div>
                    </th>
                    <th style="min-width:10rem; text-align: center">Opciones de Gestión</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-elemento>
                <tr class="hover:surface-50 transition-colors duration-200">
                    <td class="font-bold text-900">
                        <div class="flex align-items-center gap-2">
                            <i class="pi pi-tag text-primary-300"></i>
                            {{ elemento.nombre }}
                        </div>
                    </td>
                    <td>
                        <span class="text-700 font-medium capitalize">{{ elemento.tipo || 'mobiliario' }}</span>
                    </td>
                    <td>
                        <p-tag [value]="elemento.estado ? 'Activo' : 'Inactivo'"
                            [severity]="elemento.estado ? 'success' : 'danger'"
                            styleClass="px-3 py-1 border-round-lg shadow-sm font-bold uppercase"></p-tag>
                    </td>
                    <td style="text-align: center">
                        <div *ngIf="isAdmin" class="flex justify-content-center gap-2">
                            <button pButton [icon]="elemento.estado ? 'pi pi-times' : 'pi pi-check'"
                                [class]="elemento.estado ? 'p-button-rounded p-button-text p-button-warning hover:bg-warning-50' : 'p-button-rounded p-button-text p-button-success hover:bg-green-50'"
                                (click)="cambiarEstado(elemento)" [pTooltip]="elemento.estado ? 'Inhabilitar' : 'Activar'"></button>
                            <button pButton icon="pi pi-pencil"
                                class="p-button-rounded p-button-text p-button-info hover:bg-blue-50"
                                (click)="editarElemento(elemento.id)" pTooltip="Editar información"></button>
                            <button pButton icon="pi pi-trash"
                                class="p-button-rounded p-button-text p-button-danger hover:bg-red-50"
                                (click)="eliminarElemento(elemento.id)" pTooltip="Eliminar permanentemente"></button>
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="3" class="text-center p-8">
                        <div class="flex flex-column align-items-center">
                            <div class="bg-gray-100 border-round-circle p-4 mb-3">
                                <i class="pi pi-box text-400" style="font-size: 3rem"></i>
                            </div>
                            <span class="text-600 font-bold text-xl mb-1">Sin Resultados</span>
                            <span class="text-500">No se encontraron elementos disponibles en este momento.</span>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
