<div class="card border-0 shadow-sm rounded-0 mb-4 bg-white">
    <app-mantenimientoadminnavbar></app-mantenimientoadminnavbar>
</div>

<div class="fade-in-animation">
    <div class="container-fluid px-5 mb-3 mt-4">
        <button pButton icon="pi pi-arrow-left" label="Volver a Gestión Operativa" (click)="backToDashboard()"
            class="p-button-text"></button>
    </div>

    <div class="dashboard-container">
        <div class="text-center mb-5 mt-4">
            <h1 class="text-3xl font-bold mb-2">Reportes Áreas Físicas</h1>
            <p class="text-secondary text-lg">Seleccione el tipo de consulta que desea realizar.</p>
        </div>

        <div class="cards-grid mt-5" style="max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
            
            <!-- Reportes por Área -->
            <div class="dashboard-card" (click)="goToReportesPorArea()">
                <div class="card-icon-container gradient-blue">
                    <i class="pi pi-building"></i>
                </div>
                <div class="card-content">
                    <h3>Reportes por Área</h3>
                    <p>Filtros por servicio y área para encontrar historiales de mantenimiento.</p>
                    <span class="card-action">Consultar <i class="pi pi-arrow-right"></i></span>
                </div>
            </div>

            <!-- Reportes por Elemento -->
            <div class="dashboard-card shadow-sm" (click)="goToReportesPorElemento()" style="background-color: #f8f9fa;">
                <div class="card-icon-container gradient-indigo">
                    <i class="pi pi-box"></i>
                </div>
                <div class="card-content">
                    <h3>Reportes por Elemento</h3>
                    <p>Encuentre reportes específicos basándose en un elemento o activo.</p>
                    <span class="card-action">Consultar <i class="pi pi-arrow-right"></i></span>
                </div>
            </div>

        </div>
    </div>
</div>
