<div class="login-wrapper">
  <!-- Elementos decorativos de fondo -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-card">
    <div class="brand-section">
      <img src="LogoAgora.png" alt="Logo Agora" class="logo">
      <h1 class="app-title">Restablecer contraseña <span>ORBIX</span></h1>
      <p class="subtitle">Ingrese el PIN y su nueva contraseña</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="actualizarContrasena()" novalidate class="login-form">
      <div class="input-group">
        <label for="codigo">Código de Seguridad (PIN)</label>
        <div class="input-wrapper">
          <i class="pi pi-key input-icon"></i>
          <input type="text" id="codigo" formControlName="codigo" placeholder="Código de 6 dígitos enviado al correo" required>
        </div>
        <div class="text-danger-custom" *ngIf="form.get('codigo')?.invalid && form.get('codigo')?.touched">
          Debe ingresar un código válido de 6 dígitos.
        </div>
      </div>

      <div class="input-group mt-2">
        <label for="nuevaContrasena">Nueva contraseña</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input type="password" id="nuevaContrasena" formControlName="nuevaContrasena" placeholder="••••••••" required>
        </div>
        <div class="text-danger-custom" *ngIf="form.get('nuevaContrasena')?.invalid && form.get('nuevaContrasena')?.touched">
          La contraseña debe tener al menos 8 caracteres.
        </div>
      </div>
      
      <div class="input-group mt-2">
        <label for="nuevaContrasena2">Confirme la contraseña</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input type="password" id="nuevaContrasena2" formControlName="nuevaContrasena2" placeholder="••••••••" required>
        </div>
        <div class="text-danger-custom" *ngIf="form.get('nuevaContrasena')?.touched && form.get('nuevaContrasena2')?.touched && !validarContrasenas()">
          Las contraseñas no coinciden.
        </div>
      </div>

      <button class="btn-primary" type="submit" [disabled]="!validarContrasenas()">
        <span>Actualizar contraseña</span>
        <i class="pi pi-check-circle"></i>
      </button>
    </form>

    <div class="divider">
      <span>O cancelar</span>
    </div>

    <div class="secondary-actions">
      <button type="button" class="btn-guest" routerLink="/login">
        <i class="pi pi-arrow-left"></i> Volver al Login
      </button>
    </div>
  </div>
</div>
